apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-bridge-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/s152628/Stage-project-curity.git'
    targetRevision: HEAD
    path: 'confs/tailscale'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: infra-mgmt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true