loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

promtail:
  enabled: false
alloy:
  enabled: true
  alloy:
    configMap:
      create: true
      content: |
        // Ontdek alle pods in de cluster
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Lees de logbestanden van de ontdekte pods
        loki.source.kubernetes "pod_logs" {
          targets    = discovery.kubernetes.pods.targets
          forward_to = [loki.write.local.receiver]
        }

        // Stuur de logs naar je nieuwe Loki service
        loki.write "local" {
          endpoint {
            url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
          }
        }
gateway:
  enabled: false
grafana:
  enabled: false 
  sidecar:
    datasources:
      enabled: false