apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-data
  namespace: curity-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: curity-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "openldap-role-dev"
        vault.hashicorp.com/agent-inject-secret-admin-pass: "secret/data/dev/openldap/vars"
        vault.hashicorp.com/agent-inject-template-admin-pass: |
          {{- with secret "secret/data/dev/openldap/vars" -}}
          {{ .Data.data.ADMIN_PASSWORD }}
          {{- end -}}
    spec:
      serviceAccountName: openldap-sa
      containers:
      - name: openldap
        image: osixia/openldap:1.5.0
        ports:
        - containerPort: 389
          name: ldap
        - containerPort: 636
          name: ldaps
        env:
        - name: LDAP_ORGANISATION
          value: "Camazotz"
        - name: LDAP_DOMAIN
          value: "camazotz.me"
        - name: LDAP_ADMIN_PASSWORD_FILE
          value: "/vault/secrets/admin-pass"
        
        volumeMounts:
        - name: ldap-storage
          mountPath: /var/lib/ldap
          subPath: data
        - name: ldap-storage
          mountPath: /etc/ldap/slapd.d
          subPath: config
      volumes:
      - name: ldap-storage
        persistentVolumeClaim:
          claimName: openldap-data
---
apiVersion: v1
kind: Service
metadata:
  name: openldap-service
  namespace: curity-dev
spec:
  selector:
    app: openldap
  ports:
    - name: ldap
      port: 389
      targetPort: 389
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openldap-sa
  namespace: curity-dev