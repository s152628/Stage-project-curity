# --- CLOUDNATIVEPG DATABASE CLUSTER ---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: curity-db-ha
  namespace: curity-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: curity
      owner: curityuser
      secret:
        name: db-user-creds
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: curity-db-init-sql
            key: postgres-create_database.sql

---
# --- TAILSCALE RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sa
  namespace: curity-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-role
  namespace: curity-dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-rolebinding
  namespace: curity-dev
subjects:
  - kind: ServiceAccount
    name: tailscale-sa
    namespace: curity-dev
roleRef:
  kind: Role
  name: tailscale-role
  apiGroup: rbac.authorization.k8s.io

---
# --- TAILSCALE BRIDGE DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-bridge
  namespace: curity-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-bridge
  template:
    metadata:
      labels:
        app: tailscale-bridge
    spec:
      serviceAccountName: tailscale-sa
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth 
              key: TS_AUTHKEY     
        - name: TS_EXTRA_ARGS
          value: "--hostname=curity-k8s-tunnel"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - name: ts-state
          mountPath: /var/lib/tailscale
      - name: bridge
        image: alpine/socat
        command: ["sh", "-c", "
         socat TCP-LISTEN:8443,fork,reuseaddr TCP:nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:443 &
         socat TCP-LISTEN:8081,fork,reuseaddr TCP:argocd-server.argocd.svc.cluster.local:443 &
         socat TCP-LISTEN:8082,fork,reuseaddr TCP:nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:443
         "]
      volumes:
      - name: ts-state
        emptyDir: {}