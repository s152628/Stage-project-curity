# --- CLOUDNATIVEPG DATABASE CLUSTER ---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: curity-db-ha
  namespace: curity-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: curity
      owner: curityuser
      secret:
        name: db-user-creds
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: curity-db-init-sql
            key: postgres-create_database.sql
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lldap-db
  namespace: curity-dev
spec:
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: lldap
      owner: lldapuser
      secret:
        name: lldap-db-creds
---
# --- TAILSCALE RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sa
  namespace: curity-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-role
  namespace: curity-dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-rolebinding
  namespace: curity-dev
subjects:
  - kind: ServiceAccount
    name: tailscale-sa
    namespace: curity-dev
roleRef:
  kind: Role
  name: tailscale-role
  apiGroup: rbac.authorization.k8s.io

---
# --- TAILSCALE BRIDGE DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-bridge
  namespace: curity-dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-bridge
  template:
    metadata:
      labels:
        app: tailscale-bridge
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "tailscale-role-dev"
        vault.hashicorp.com/agent-inject-secret-tailscale-auth: "secret/data/dev/tailscale/auth"
        vault.hashicorp.com/agent-inject-template-tailscale-auth: |
          {{- with secret "secret/data/dev/tailscale/auth" -}}
          export TS_AUTHKEY="{{ .Data.data.TS_AUTHKEY }}"
          {{- end -}}
    spec:
      serviceAccountName: tailscale-sa
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        env:   
        - name: TS_EXTRA_ARGS
          value: "--hostname=curity-dev-k8s-tunnel"
        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/tailscale-auth && exec /usr/local/bin/containerboot"]
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - name: ts-state
          mountPath: /var/lib/tailscale
      - name: bridge
        image: alpine/socat
        command: ["sh", "-c", "
         socat TCP-LISTEN:8443,fork,reuseaddr TCP:nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:443
         "]
      volumes:
      - name: ts-state
        emptyDir: {}
# --- TEST APPLICATION DEPLOYMENT ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-testapp
  namespace: curity-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-testapp
  template:
    metadata:
      labels:
        app: auth-testapp
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "testapp-role-dev"
        vault.hashicorp.com/agent-inject-secret-testapp-vars: "secret/data/dev/testapp/vars"
        vault.hashicorp.com/agent-inject-template-testapp-vars: |
          {{- with secret "secret/data/dev/testapp/vars" -}}
          export CLIENT_ID="{{ .Data.data.CLIENT_ID }}"
          export CLIENT_SECRET="{{ .Data.data.CLIENT_SECRET }}"
          export ISSUER_URL="{{ .Data.data.ISSUER_URL }}"
          export REDIRECT_URI="{{ .Data.data.REDIRECT_URI }}"
          export SESSION_SECRET="{{ .Data.data.SESSION_SECRET }}"
          {{- end -}}
    spec:
      serviceAccountName: auth-testapp-sa
      initContainers:
      - name: wait-for-curity
        image: busybox
        command: ['sh', '-c', "until nc -zv curity-dev-stack-idsvr-runtime-svc.curity-dev.svc.cluster.local 8443; do echo waiting for curity; sleep 2; done;"]
      containers:
      - name: testapp
        image: camazotz01/auth-testapp:latest 
        ports:
        - containerPort: 3000
        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/testapp-vars && exec node testapp.js"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-testapp-service
  namespace: curity-dev
spec:
  selector:
    app: auth-testapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-testapp-ingress
  namespace: curity-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-real-ip-cidr: "0.0.0.0/0" 
spec:
  rules:
  - host: app-dev.camazotz.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-testapp-service
            port:
              number: 80