apiVersion: v1
kind: ServiceAccount
metadata:
  name: lldap-sa
  namespace: curity-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lldap-data
  namespace: curity-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: curity-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "lldap-role-prod"
        vault.hashicorp.com/agent-inject-secret-lldap-vars: "secret/data/prod/lldap/vars"
        vault.hashicorp.com/agent-inject-template-lldap-vars: |
          {{- with secret "secret/data/prod/lldap/vars" -}}
          export LLDAP_JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          export LLDAP_LDAP_USER_PASS="{{ .Data.data.ADMIN_PASSWORD }}"
          export LLDAP_KEY_SEED="{{ .Data.data.LLDAP_KEY_SEED }}"
          {{- end -}}
    spec:
      serviceAccountName: lldap-sa
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: ["sh", "-c", "chmod 777 /data"]
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: lldap
        image: nitnelave/lldap:latest
        ports:
        - containerPort: 3890
          name: ldap-port
        - containerPort: 17170
          name: http-port
        env:
        - name: LLDAP_LDAP_BASE_DN
          value: "dc=camazotz,dc=me"
        - name: LLDAP_HTTP_URL
          value: "https://ldap-prod.camazotz.me" 
        - name: LLDAP_VERBOSE
          value: "true"
        - name: LLDAP_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lldap-db-app
              key: uri

        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/lldap-vars && exec /app/lldap run"]
        
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: lldap-data
---
apiVersion: v1
kind: Service
metadata:
  name: lldap-service
  namespace: curity-prod
spec:
  selector:
    app: lldap
  ports:
    - port: 3890
      targetPort: 3890
      name: ldap-port
    - port: 80
      targetPort: 17170
      name: http-port
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lldap-ingress
  namespace: curity-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-real-ip-cidr: "0.0.0.0/0"
spec:
  rules:
  - host: ldap-prod.camazotz.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lldap-service
            port:
              number: 80