# --- CLOUDNATIVEPG DATABASE CLUSTER ---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: curity-db-ha
  namespace: curity-prod
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: curity
      owner: curityuser
      secret:
        name: db-user-creds
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: curity-db-init-sql
            key: postgres-create_database.sql

# --- Curity config store ---
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: curity-config-db
  namespace: curity-prod
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: curity_config
  owner: curityuser
  cluster:
    name: curity-db-ha

# --- TEST APPLICATION DEPLOYMENT ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-testapp
  namespace: curity-prod
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-testapp
  template:
    metadata:
      labels:
        app: auth-testapp
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "testapp-role-prod"
        vault.hashicorp.com/agent-inject-secret-testapp-vars: "secret/data/prod/testapp/vars"
        vault.hashicorp.com/agent-inject-template-testapp-vars: |
          {{- with secret "secret/data/prod/testapp/vars" -}}
          export CLIENT_ID="{{ .Data.data.CLIENT_ID }}"
          export CLIENT_SECRET="{{ .Data.data.CLIENT_SECRET }}"
          export ISSUER_URL="{{ .Data.data.ISSUER_URL }}"
          export REDIRECT_URI="{{ .Data.data.REDIRECT_URI }}"
          export SESSION_SECRET="{{ .Data.data.SESSION_SECRET }}"
          {{- end -}}
    spec:
      serviceAccountName: auth-testapp-sa
      initContainers:
      - name: wait-for-curity
        image: busybox
        command: ['sh', '-c', "until nc -zv curity-prod-stack-idsvr-runtime-svc.curity-prod.svc.cluster.local 8443; do echo waiting for curity; sleep 2; done;"]
      containers:
      - name: testapp
        image: camazotz01/auth-testapp:latest 
        ports:
        - containerPort: 3000
        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/testapp-vars && exec node testapp.js"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-testapp-service
  namespace: curity-prod
spec:
  selector:
    app: auth-testapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-testapp-ingress
  namespace: curity-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-real-ip-cidr: "0.0.0.0/0" 
spec:
  rules:
  - host: app.camazotz.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-testapp-service
            port:
              number: 80