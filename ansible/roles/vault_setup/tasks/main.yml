    {
      "JWT_SECRET": "{{ lldap_jwt_secret }}",
      "ADMIN_PASSWORD": "{{ lldap_admin_password }}"
    }
    JSON_PAYLOAD
    EOF

- name: Configureer Vault voor Curity Toegang
  ansible.builtin.shell: |
    kubectl exec -i -n vault vault-0 -c vault -- /bin/sh -s << 'EOF'
    export VAULT_ADDR='http://127.0.0.1:8200'
    export VAULT_TOKEN='{{ vault_keys.root_token }}'

    vault auth enable kubernetes || true

    echo 'path "secret/data/{{ env }}/curity/*" { capabilities = ["read"] }' | vault policy write curity-policy-{{ env }} -

    vault write auth/kubernetes/config kubernetes_host="https://kubernetes.default.svc"

    vault write auth/kubernetes/role/curity-role-{{ env }} \
        bound_service_account_names=curity \
        bound_service_account_namespaces="curity-{{ env }}" \
        policies=curity-policy-{{ env }} \
        ttl=24h
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: vault_config_result

- name: Configureer Vault voor Testapp Toegang (Vault Agent)
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml exec -i -n vault vault-0 -c vault -- /bin/sh -s << 'EOF'
    export VAULT_ADDR='http://127.0.0.1:8200'
    export VAULT_TOKEN='{{ vault_keys.root_token }}'

    echo 'path "secret/data/{{ env }}/testapp/*" { capabilities = ["read"] }' | vault policy write testapp-policy-{{ env }} -

    vault write auth/kubernetes/role/testapp-role-{{ env }} \
        bound_service_account_names=auth-testapp-sa \
        bound_service_account_namespaces="curity-{{ env }}" \
        policies=testapp-policy-{{ env }} \
        ttl=24h
    EOF
    
