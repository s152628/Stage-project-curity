- name: Rol Vault Secrets Operator uit via Argo CD
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: vault-secrets-operator
        namespace: argocd
      spec:
        project: default
        source:
          chart: vault-secrets-operator
          repoURL: https://helm.releases.hashicorp.com
          targetRevision: 0.10.0
        destination:
          server: https://kubernetes.default.svc
          namespace: vault-secrets-operator
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true

- name: Wacht tot de Vault Secrets Operator CRDs geladen zijn door Argo CD
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    kind: CustomResourceDefinition
    name: vaultstaticsecrets.secrets.hashicorp.com
  register: crd_check
  until: crd_check.resources | length > 0
  retries: 12
  delay: 10

- name: "Zorg dat Namespace curity-{{ env }} bestaat"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: "curity-{{ env }}"
    kind: Namespace
    state: present

- name: Configureer VaultConnection 
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultConnection
      metadata:
        name: default
        namespace: vault-secrets-operator
      spec:
        address: http://vault.vault.svc.cluster.local:8200
        skipTLSVerify: true

- name: Maak Curity ServiceAccount aan voor Vault authenticatie
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: curity
        namespace: "curity-{{ env }}"

- name: Maak Testapp ServiceAccount aan voor Vault authenticatie
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: auth-testapp-sa
        namespace: "curity-{{ env }}"


- name: Configureer VaultAuth voor VSO in de Curity namespace
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: curity-auth-config 
        namespace: "curity-{{ env }}"
      spec:
        method: kubernetes
        mount: kubernetes
        kubernetes:
          role: curity-role-{{env}}
          serviceAccount: curity


- name: Synchroniseer DB Secrets van Vault naar K8s Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: db-creds-sync
        namespace: "curity-{{ env }}"
      spec:
        mount: secret
        type: kv-v2
        path: "{{env}}/curity/db"
        destination:
          name: db-user-creds
          create: true
        vaultAuthRef: curity-auth-config

- name: Synchroniseer Curity Vars van Vault naar K8s Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: curity-vars-sync
        namespace: "curity-{{ env }}"
      spec:
        mount: secret
        type: kv-v2
        path: "{{ env }}/curity/vars"
        destination:
          name: curity-vars
          create: true
        vaultAuthRef: curity-auth-config

- name: Synchroniseer Curity Config van Vault naar K8s Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: curity-config-sync
        namespace: "curity-{{ env }}"
      spec:
        mount: secret
        type: kv-v2
        path: "{{ env }}/curity/config"
        destination:
          name: curity-config-secret
          create: true
        vaultAuthRef: curity-auth-config

- name: Synchroniseer Curity Cluster Secret van Vault naar K8s Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultStaticSecret
      metadata:
        name: curity-cluster-sync
        namespace: "curity-{{ env }}"
      spec:
        mount: secret
        type: kv-v2
        path: "{{ env }}/curity/cluster"
        destination:
          name: curity-cluster-secret
          create: true
        vaultAuthRef: curity-auth-config