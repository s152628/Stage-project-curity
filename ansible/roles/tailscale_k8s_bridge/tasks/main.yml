- name: "Zorg dat de namespace {{ tailscale_namespace }} bestaat"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: "{{ tailscale_namespace }}"
    kind: Namespace
    state: present

- name: "Maak het Tailscale Auth Secret aan"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tailscale-auth
        namespace: "{{ tailscale_namespace }}"
      stringData:
        TS_AUTHKEY: "{{ tailscale_auth_key }}"

- name: "Maak ServiceAccount aan voor Tailscale"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: tailscale-bridge-sa
        namespace: "{{ tailscale_namespace }}"

- name: "Maak RBAC Role aan voor Tailscale"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: tailscale-bridge-role
        namespace: "{{ tailscale_namespace }}"
      rules:
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get", "create", "update", "patch"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "patch"]

- name: "Koppel Role aan ServiceAccount"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: tailscale-bridge-binding
        namespace: "{{ tailscale_namespace }}"
      subjects:
      - kind: ServiceAccount
        name: tailscale-bridge-sa
      roleRef:
        kind: Role
        name: tailscale-bridge-role
        apiGroup: rbac.authorization.k8s.io
  
- name: "Rol de Tailscale Bridge uit"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'deployment.j2') | from_yaml }}"