- name: Wacht tot ArgoCD de OpenLDAP pod heeft gesynchroniseerd en opgestart
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml wait \
      --namespace curity-{{ env }} \
      --for=condition=available deployment/openldap \
      --timeout=300s
  register: wait_result
  until: wait_result.rc == 0
  retries: 12
  delay: 10
  
- name: Lees users.json in als variabele
  ansible.builtin.include_vars:
    file: users.json
    name: user_data

- name: Vertaal JSON naar LDIF en injecteer direct in OpenLDAP voor {{ env }}
  ansible.builtin.shell: |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml exec -i -n curity-{{ env }} deployment/openldap -- ldapadd -x -D "cn=admin,dc=camazotz,dc=me" -w "{{ openldap_admin_password }}" -H ldap://localhost << 'EOF'
    dn: ou=people,dc=camazotz,dc=me
    objectClass: organizationalUnit
    ou: people

    {% for user in user_data.users %}
    dn: uid={{ user.uid }},ou=people,dc=camazotz,dc=me
    objectClass: inetOrgPerson
    objectClass: top
    uid: {{ user.uid }}
    cn: {{ user.uid }}
    sn: {{ user.lastName }}
    givenName: {{ user.firstName }}
    mail: {{ user.email }}
    userPassword: {{ user.password }}

    {% endfor %}
    EOF
  register: ldap_result
  failed_when: ldap_result.rc not in [0, 68]
  changed_when: ldap_result.rc == 0