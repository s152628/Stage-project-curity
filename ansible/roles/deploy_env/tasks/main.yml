---
- name: Rol de Nginx Ingress Controller uit via Argo CD
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: nginx-ingress
        namespace: argocd
      spec:
        project: default
        source:
          chart: ingress-nginx
          repoURL: https://kubernetes.github.io/ingress-nginx
          targetRevision: 4.1.1
          helm:
            values: |
              controller:
                kind: DaemonSet
                hostNetwork: true
                dnsPolicy: ClusterFirstWithHostNet
                service:
                  type: ClusterIP
                publishService:
                  enabled: false
        destination:
          server: https://kubernetes.default.svc
          namespace: ingress-nginx
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true

- name: Rol de CloudNativePG Operator uit via Argo CD
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: cloudnative-pg-operator
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: https://cloudnative-pg.github.io/charts
          targetRevision: '0.27.1'
          chart: cloudnative-pg
        destination:
          server: https://kubernetes.default.svc
          namespace: cloudnative-pg
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - replace=true

- name: "Installeer de Monitoring Stack via ArgoCD"
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: kube-prometheus-stack
        namespace: argocd
      spec:
        project: default
        source:
          chart: kube-prometheus-stack
          repoURL: https://prometheus-community.github.io/helm-charts
          targetRevision: 82.4.3
          helm:
            values: |
              grafana:
                adminPassword: "{{ grafana_admin_password }}"
                grafana.ini:
                  server:
                    domain: {{ grafana_link }}
                    root_url: https://{{ grafana_link }}
                    serve_from_sub_path: false
                service:
                  type: ClusterIP
              prometheus:
                prometheusSpec:
                  retention: 10d
        destination:
          server: "https://kubernetes.default.svc"
          namespace: monitoring
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true

