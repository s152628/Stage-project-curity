---
- name: Installeer benodigdheden
  apt:
    name: [socat, curl, python3-pip, git, apt-transport-https, python3-kubernetes, python3-yaml, apache2-utils]
    update_cache: true

- name: Voeg K8s GPG sleutel toe
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc

- name: Voeg K8s repo toe
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    filename: kubernetes

- name: Installeer kubectl
  apt:
    name: kubectl