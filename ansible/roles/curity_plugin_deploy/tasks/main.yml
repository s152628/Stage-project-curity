# ansible/roles/curity_plugin_deploy/tasks/main.yml
---
- name: Controleer of de plugin JAR bestaat
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../apps/curity-plugins/google-ldap-link/google-ldap-link-action-1.0.0-SNAPSHOT.jar"
  register: plugin_jar
  delegate_to: localhost

- name: Stop als de JAR niet bestaat
  ansible.builtin.fail:
    msg: |
      Plugin JAR niet gevonden.
      Voer eerst uit: cd google-ldap-link-action && mvn clean package -DskipTests
  when: not plugin_jar.stat.exists

- name: Maak plugin directory aan op de VM
  ansible.builtin.file:
    path: /opt/curity-plugins/google-ldap-link
    state: directory
    mode: '0755'

- name: Kopieer plugin JAR naar de VM
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../apps/curity-plugins/google-ldap-link/google-ldap-link-action-1.0.0-SNAPSHOT.jar"
    dest: /opt/curity-plugins/google-ldap-link/google-ldap-link-action.jar
    mode: '0644'

- name: Maak PersistentVolume aan voor plugin JAR
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: curity-plugin-pv-{{ env }}
      spec:
        capacity:
          storage: 50Mi
        accessModes:
          - ReadWriteOnce   
        persistentVolumeReclaimPolicy: Retain
        storageClassName: local-path
        hostPath:
          path: /opt/curity-plugins/google-ldap-link
          type: Directory

- name: Maak PersistentVolumeClaim aan voor plugin JAR
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: curity-plugin-pvc
        namespace: "curity-{{ env }}"
      spec:
        accessModes:
          - ReadWriteOnce   
        storageClassName: local-path
        volumeName: curity-plugin-pv-{{ env }}
        resources:
          requests:
            storage: 50Mi

